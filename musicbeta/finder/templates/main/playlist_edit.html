{% extends 'main/base.html' %}

{% block title %}Edit Playlist - Finder{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-6">
            <div class="card border-0">
                <div class="card-header border-0">
                    <h4 class="card-title mb-0"><i class="fas fa-edit me-2 text-primary"></i>Edit Playlist</h4>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold">Playlist Name</label>
                            <input id="name" name="name" class="form-control" value="{{ playlist.name }}" required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea id="description" name="description" class="form-control" rows="4">{{ playlist.description }}</textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-between flex-wrap">
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-primary">
                                Cancel
                            </a>
                            <div class="d-flex gap-2">
                                <a href="{% url 'delete_playlist' playlist.id %}" class="btn btn-outline-danger" onclick="return confirm('Delete this playlist?')">
                                    <i class="fas fa-trash me-1"></i>Delete
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    Save
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
