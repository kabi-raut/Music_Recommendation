{% extends 'main/base.html' %}
{% block title %}Forgot Password - Finder{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
            <div class="card border-0" style="background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(22px) saturate(150%); border: 1px solid rgba(99, 102, 241, 0.14) !important; box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div style="width: 74px; height: 74px; margin: 0 auto 1.25rem; background: linear-gradient(135deg, rgba(99, 102, 241, 0.9) 0%, rgba(236, 72, 153, 0.85) 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px rgba(99, 102, 241, 0.22);">
                            <i class="fas fa-envelope-open-text fa-2x" style="color: white;"></i>
                        </div>
                        <h2 class="mb-2" style="background: var(--gradient-purple); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">Forgot Password</h2>
                        <p class="text-secondary mb-0">Enter your account email to receive a 6-digit OTP.</p>
                    </div>

                    <form method="post" data-loading-text="Sending OTP to your email...">
                        {% csrf_token %}
                        {{ form|crispy }}

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mt-3" style="font-size: 1.02rem;">
                            <i class="fas fa-paper-plane me-2"></i>Send OTP
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" class="text-decoration-none" style="color: #6366f1; font-weight: 600;">
                            <i class="fas fa-arrow-left me-1"></i>Back to login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
